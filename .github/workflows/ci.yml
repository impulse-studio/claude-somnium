name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write       # needed by dorny/test-reporter to annotate PRs

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check somnium tests

      - name: Pytest with JUnit XML + coverage
        run: |
          pytest \
            --ignore=tests/e2e \
            --junitxml=reports/junit.xml \
            --cov=somnium \
            --cov-report=term \
            --cov-report=html:reports/coverage-html \
            -q
        env:
          # Ensure no real API key leaks into unit tests.
          VOYAGE_API_KEY: ""

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-py${{ matrix.python-version }}
          path: reports/
          retention-days: 30

      - name: Annotate PR with test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit tests (Python ${{ matrix.python-version }})
          path: reports/junit.xml
          reporter: java-junit
          fail-on-error: true
